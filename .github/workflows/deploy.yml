name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so the page footer can read each file's last commit.
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        run: npm run build
        env:
          # Authenticates build-time GitHub API calls (commit diff embeds).
          GITHUB_TOKEN: ${{ github.token }}

      # Deploy only when Cloudflare credentials are configured as repo secrets.
      # Without them, the build above still runs as a CI check and this is skipped.
      - name: Check for Cloudflare credentials
        id: cf
        env:
          TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ -n "$TOKEN" ]; then echo "ready=true" >> "$GITHUB_OUTPUT"; else echo "ready=false" >> "$GITHUB_OUTPUT"; fi

      - name: Deploy to Cloudflare Pages
        if: steps.cf.outputs.ready == 'true' && github.event_name == 'push'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx wrangler@4 pages project create help-mementomori-social --production-branch main 2>/dev/null || true
          npx wrangler@4 pages deploy out --project-name=help-mementomori-social --branch=main
